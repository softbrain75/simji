version: 1
frontend:
  phases:
    build:
      commands:
        - 'echo "window.SIMJI_CONFIG = { apiUrl: \"$SIMJI_API_URL\" };" > config.js'
  artifacts:
    baseDirectory: .
    files:
      - index.html
      - styles.css
      - detail-edit.css
      - media.css
      - app.js
      - config.js
      - manifest.webmanifest
      - service-worker.js
      - icons/simji-icon.svg
      - icons/simji-heart.svg
      - icons/simji-heart-180.png
      - icons/simji-heart-192.png
      - icons/simji-heart-512.png
  cache:
    paths: []
