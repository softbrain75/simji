AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 심지회 공동 장부 API - 영수증 자동 분석 및 저장

Parameters:
  AllowedOrigin:
    Type: String
    Default: '*'
    Description: Amplify 배포 URL. 최초 배포 시에는 *로 두고, 배포 후 실제 URL로 변경합니다.
  SessionSecret:
    Type: String
    NoEcho: true
    MinLength: 32
    Description: 로그인 세션 서명용 긴 무작위 문자열
  MemberPinHashes:
    Type: String
    NoEcho: true
    Description: 멤버별 최초 기기 등록 번호의 salted scrypt hash JSON
  PasskeyRpId:
    Type: String
    Default: main.d3dh2y9z0noh47.amplifyapp.com
  PasskeyOrigin:
    Type: String
    Default: https://main.d3dh2y9z0noh47.amplifyapp.com
  BedrockModelId:
    Type: String
    Default: global.amazon.nova-2-lite-v1:0
  PhotoPlaceIndexName:
    Type: String
    Default: simji-photo-places

Resources:
  SimjiApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - content-type
          - authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowOrigins:
          - !Ref AllowedOrigin

  LedgerTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  ReceiptBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
            AllowedOrigins:
              - !Ref AllowedOrigin
            MaxAge: 3600
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  SimjiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: backend/
      Handler: app.handler
      Runtime: nodejs24.x
      MemorySize: 1024
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref LedgerTable
          BUCKET_NAME: !Ref ReceiptBucket
          ALLOWED_ORIGIN: !Ref AllowedOrigin
          SESSION_SECRET: !Ref SessionSecret
          MEMBER_PIN_HASHES: !Ref MemberPinHashes
          PASSKEY_RP_ID: !Ref PasskeyRpId
          PASSKEY_ORIGIN: !Ref PasskeyOrigin
          MEMBERS: 종남,인기,상훈,민철,공근,성호
          TREASURER: 성호
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          GEO_PLACES_REGION: ap-northeast-1
          PHOTO_PLACE_INDEX_NAME: !Ref PhotoPlaceIndexName
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LedgerTable
        - S3ReadPolicy:
            BucketName: !Ref ReceiptBucket
        - S3WritePolicy:
            BucketName: !Ref ReceiptBucket
        - Statement:
            Effect: Allow
            Action:
              - bedrock:InvokeModel
            Resource: '*'
        - Statement:
            Effect: Allow
            Action:
              - geo-places:ReverseGeocode
            Resource: arn:aws:geo-places:ap-northeast-1::provider/default
        - Statement:
            Effect: Allow
            Action:
              - geo:SearchPlaceIndexForPosition
            Resource: !Sub arn:${AWS::Partition}:geo:ap-northeast-1:${AWS::AccountId}:place-index/${PhotoPlaceIndexName}
      Events:
        Auth:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth
            Method: POST
        PersonalPinAuth:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth/pin
            Method: POST
        PersonalPinSetup:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth/pin/setup
            Method: POST
        PasskeyRegistrationOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth/passkey/register/options
            Method: POST
        PasskeyRegistrationVerify:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth/passkey/register/verify
            Method: POST
        PasskeyAdditionalRegistrationOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth/passkey/add/options
            Method: POST
        PasskeyAdditionalRegistrationVerify:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth/passkey/add/verify
            Method: POST
        PasskeyAuthenticationOptions:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth/passkey/options
            Method: POST
        PasskeyAuthenticationVerify:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /auth/passkey/verify
            Method: POST
        Records:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /records
            Method: GET
        ListMedia:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /media
            Method: GET
        GetMedia:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /media/{id}
            Method: GET
        SavePhoto:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /media/photos
            Method: POST
        SaveVideo:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /media/videos
            Method: POST
        UpdateMedia:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /media/{id}
            Method: PATCH
        DeleteMedia:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /media/{id}
            Method: DELETE
        ScanExpense:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /expenses/scan
            Method: POST
        ScanIncome:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /incomes/scan
            Method: POST
        UpdateExpense:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /expenses/{id}
            Method: PATCH
        UpdatePaymentStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /expenses/{id}/payment
            Method: PATCH
        DeleteExpense:
          Type: HttpApi
          Properties:
            ApiId: !Ref SimjiApi
            Path: /expenses/{id}
            Method: DELETE

Outputs:
  ApiUrl:
    Description: SIMJI_API_URL에 넣을 API Gateway 주소
    Value: !Sub https://${SimjiApi}.execute-api.${AWS::Region}.amazonaws.com
  ReceiptBucketName:
    Value: !Ref ReceiptBucket
  LedgerTableName:
    Value: !Ref LedgerTable
